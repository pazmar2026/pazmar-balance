# fly.toml — Configuração do Pazmar Balance para Fly.io
# Documentação: https://fly.io/docs/reference/configuration/

app = "pazmar-balance"
primary_region = "ams"  # Amsterdão

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "8080"
  NODE_ENV = "production"
  DB_PATH = "/data/pazmar.db"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = "connections"
    hard_limit = 100
    soft_limit = 80

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1

# Volume persistente para a base de dados SQLite
[[mounts]]
  source = "pazmar_data"
  destination = "/data"
  initial_size = "1gb"
